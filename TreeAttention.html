<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EAGLE-3 真实引擎逻辑模拟器 </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        body { margin: 0; background-color: #020617; }
        
        @keyframes glowCell {
            0% { box-shadow: inset 0 0 0 rgba(139, 92, 246, 0); background-color: rgba(30, 41, 59, 0.5); }
            50% { box-shadow: inset 0 0 25px rgba(139, 92, 246, 0.9); background-color: rgba(139, 92, 246, 0.4); border-color: #a78bfa; }
            100% { box-shadow: inset 0 0 0 rgba(139, 92, 246, 0); background-color: rgba(30, 41, 59, 0.5); }
        }
        @keyframes shatter {
            0% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; filter: grayscale(0%); }
            20% { transform: translate(-50%, -50%) scale(1.1) rotate(-5deg); opacity: 1; filter: grayscale(50%); border-color: #ef4444; }
            100% { transform: translate(-50%, 60px) scale(0.5) rotate(25deg); opacity: 0; filter: grayscale(100%); }
        }
        @keyframes fadeOut { 0% { opacity: 1; } 100% { opacity: 0; } }
        @keyframes popInFaint { 0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; } 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; } }
        @keyframes popInSolid { 0% { transform: translate(-50%, -50%) scale(0.9); opacity: 0.6; } 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; } }
        @keyframes popInScale { 0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; } 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; } }
        @keyframes saveToCache {
            0% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 0 rgba(16, 185, 129, 0); border-color: #a78bfa; }
            50% { transform: translate(-50%, -50%) scale(1.05); box-shadow: 0 0 30px rgba(16, 185, 129, 0.8); border-color: #34d399; background-color: rgba(6, 78, 59, 0.8); }
            100% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 15px rgba(16, 185, 129, 0.3); border-color: #10b981; }
        }
        @keyframes slideInRight { 0% { transform: translateX(30px); opacity: 0; } 100% { transform: translateX(0); opacity: 1; } }
        @keyframes flowDown { 0% { stroke-dashoffset: 20; opacity: 1; } 100% { stroke-dashoffset: 0; opacity: 1; } }
        @keyframes lineDrop { 0% { height: 0%; opacity: 1;} 50% { height: 100%; opacity: 1;} 100% { height: 100%; opacity: 0;} }

        .bg-striped-dead {
            background-image: repeating-linear-gradient(-45deg, rgba(239, 68, 68, 0.15) 0px, rgba(239, 68, 68, 0.15) 8px, rgba(15, 23, 42, 0.9) 8px, rgba(15, 23, 42, 0.9) 16px);
            border-color: rgba(239, 68, 68, 0.4);
            color: rgba(239, 68, 68, 0.6);
        }
        .custom-scrollbar::-webkit-scrollbar { height: 10px; width: 10px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0f172a; border-radius: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 5px; border: 2px solid #0f172a; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        const { useEffect, useState, useMemo } = React;

        const Icon = ({ path, className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} dangerouslySetInnerHTML={{ __html: path }} />;
        const Play = (p) => <Icon {...p} path='<polygon points="5 3 19 12 5 21 5 3"></polygon>' />;
        const CheckCircle2 = (p) => <Icon {...p} path='<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline>' />;
        const XCircle = (p) => <Icon {...p} path='<circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line>' />;
        const Cpu = (p) => <Icon {...p} path='<rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect><rect x="9" y="9" width="6" height="6"></rect><line x1="9" y1="1" x2="9" y2="4"></line><line x1="15" y1="1" x2="15" y2="4"></line><line x1="9" y1="20" x2="9" y2="23"></line><line x1="15" y1="20" x2="15" y2="23"></line><line x1="20" y1="9" x2="23" y2="9"></line><line x1="20" y1="14" x2="23" y2="14"></line><line x1="1" y1="9" x2="4" y2="9"></line><line x1="1" y1="14" x2="4" y2="14"></line>' />;
        const Zap = (p) => <Icon {...p} path='<polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>' />;
        const GitBranch = (p) => <Icon {...p} path='<line x1="6" y1="3" x2="6" y2="15"></line><circle cx="18" cy="6" r="3"></circle><circle cx="6" cy="18" r="3"></circle><path d="M18 9a9 9 0 0 1-9 9"></path>' />;
        const Layers = (p) => <Icon {...p} path='<polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline>' />;
        const Hash = (p) => <Icon {...p} path='<line x1="4" y1="9" x2="20" y2="9"></line><line x1="4" y1="15" x2="20" y2="15"></line><line x1="10" y1="3" x2="8" y2="21"></line><line x1="16" y1="3" x2="14" y2="21"></line>' />;
        const Code = (p) => <Icon {...p} path='<polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline>' />;
        const Database = (p) => <Icon {...p} path='<ellipse cx="12" cy="5" rx="9" ry="3"></ellipse><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"></path><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"></path>' />;
        const ChevronLeft = (p) => <Icon {...p} path='<polyline points="15 18 9 12 15 6"></polyline>' />;
        const ChevronRight = (p) => <Icon {...p} path='<polyline points="9 18 15 12 9 6"></polyline>' />;

        const Y_OFFSET = 270; 
        const ROOT_NODE = { id: 'root', text: 'SGLang is', x: 80, y: 220 + Y_OFFSET };

        const ALL_DRAFT_NODES = [
            { id: 'n1', text: 'designed', parent: 'root', x: 280, y: 100 + Y_OFFSET, depth: 1, isDummy: false, prob: 0.45 },
            { id: 'n2', text: 'built',    parent: 'root', x: 280, y: 220 + Y_OFFSET, depth: 1, isDummy: false, prob: 0.35 },
            { id: 'n3', text: 'a',        parent: 'root', x: 280, y: 340 + Y_OFFSET, depth: 1, isDummy: false, prob: 0.15 },
            { id: 'd1', text: 'used',     parent: 'root', x: 280, y: 450 + Y_OFFSET, depth: 1, isDummy: true,  prob: 0.02 },

            { id: 'n4', text: 'for',      parent: 'n1',   x: 490, y: 100 + Y_OFFSET, depth: 2, isDummy: false, prob: 0.78 },
            { id: 'n5', text: 'with',     parent: 'n2',   x: 490, y: 190 + Y_OFFSET, depth: 2, isDummy: false, prob: 0.65 }, 
            { id: 'd2', text: 'by',       parent: 'n2',   x: 490, y: 260 + Y_OFFSET, depth: 2, isDummy: true,  prob: 0.04 }, 
            { id: 'n6', text: 'fast',     parent: 'n3',   x: 490, y: 340 + Y_OFFSET, depth: 2, isDummy: false, prob: 0.60 }, 

            { id: 'n7', text: 'LLMs',     parent: 'n4',   x: 700, y: 100 + Y_OFFSET, depth: 3, isDummy: false, prob: 0.88 },
            { id: 'd3', text: 'in',       parent: 'n5',   x: 700, y: 190 + Y_OFFSET, depth: 3, isDummy: true,  prob: 0.03 },
            { id: 'n8', text: 'engine',   parent: 'n6',   x: 700, y: 340 + Y_OFFSET, depth: 3, isDummy: false, prob: 0.06 }
        ];

        const VALID_NODES = ALL_DRAFT_NODES.filter(n => !n.isDummy);
        
        const TREE_MASK = VALID_NODES.map(rowNode => {
            return VALID_NODES.map(colNode => {
                let current = rowNode.id;
                let guard = 0;
                while (current !== 'root' && guard < 50) {
                    guard++;
                    if (current === colNode.id) return 1; 
                    const nodeInfo = VALID_NODES.find(n => n.id === current);
                    if (!nodeInfo) break;
                    current = nodeInfo.parent;
                }
                return 0; 
            });
        });

        const TARGET_PREDICTIONS = [
            { sourceId: 'n1', target: 'for', prob: 0.98 },
            { sourceId: 'n2', target: 'with', prob: 0.40 }, 
            { sourceId: 'n3', target: 'fast', prob: 0.12 }, 
            { sourceId: 'n4', target: 'LLMs', prob: 0.99 },
            { sourceId: 'n5', target: 'memory', prob: 0.25 },
            { sourceId: 'n6', target: 'engine', prob: 0.05 },
            { sourceId: 'n7', target: '.', prob: 0.85 },
            { sourceId: 'n8', target: 'systems', prob: 0.01 },
        ];
        
        const getCandidatesData = (nodeId) => {
            const data = {
                'root': [
                    { t: 'designed', p: 0.45, pass: true }, { t: 'built', p: 0.35, pass: true }, { t: 'a', p: 0.15, pass: true }
                ],
                'n1': [
                    { t: 'for', p: 0.78, pass: true }, { t: 'to', p: 0.02, pass: false }, { t: 'it', p: 0.01, pass: false }
                ],
                'n2': [
                    { t: 'with', p: 0.65, pass: true }, { t: 'by', p: 0.04, pass: false }, { t: 'in', p: 0.01, pass: false }
                ],
                'n3': [
                    { t: 'fast', p: 0.60, pass: true }, { t: 'new', p: 0.03, pass: false }, { t: 'the', p: 0.01, pass: false }
                ],
                'n4': [
                    { t: 'LLMs', p: 0.88, pass: true }, { t: 'AI', p: 0.04, pass: false }, { t: 'models', p: 0.02, pass: false }
                ],
                'n5': [
                    { t: 'in', p: 0.03, pass: false }, { t: 'mem', p: 0.01, pass: false }, { t: 'all', p: 0.01, pass: false }
                ],
                'n6': [
                    { t: 'engine', p: 0.06, pass: true }, { t: 'sys', p: 0.02, pass: false }, { t: 'app', p: 0.01, pass: false }
                ]
            };
            return data[nodeId] || [
                { t: 'w1', p: 0.1, pass: true }, { t: 'w2', p: 0.02, pass: false }, { t: 'w3', p: 0.01, pass: false }
            ];
        };

        function EagleSpeculativeSimulator() {
            // 核心重构：将原本的 useEffect 定时器彻底移除，构建线性的微步骤状态机
            const STATES = useMemo(() => {
                const s = [];
                // 第 0 步：初始静止态
                s.push({ phase: 0, treeDepth: 0, algoStage: 0, activeRow: -1 });
                
                // 第 1 到 21 步：生成阶段（Depth 1 到 3，每个 Depth 包含 algoStage 0 到 6 共 7 帧）
                for (let d = 1; d <= 3; d++) {
                    s.push({ phase: 1, treeDepth: d, algoStage: 0, activeRow: -1 }); // 阶段0：挂载准备帧（点变小）
                    for (let a = 1; a <= 6; a++) {
                        s.push({ phase: 1, treeDepth: d, algoStage: a, activeRow: -1 });
                    }
                }
                
                // 第 22 步：平铺连续过渡
                s.push({ phase: 2, treeDepth: 3, algoStage: 6, activeRow: -1 });
                
                // 第 23 到 30 步：Mask并发扫描行 (共8个有效节点)
                for (let r = 0; r < VALID_NODES.length; r++) {
                    s.push({ phase: 3, treeDepth: 3, algoStage: 6, activeRow: r });
                }
                
                // 第 31 步：等待对齐校验
                s.push({ phase: 4, treeDepth: 3, algoStage: 6, activeRow: -1 });
                // 第 32 步：完成并接收结果
                s.push({ phase: 5, treeDepth: 3, algoStage: 6, activeRow: -1 });
                
                return s;
            }, []);

            const [stepIndex, setStepIndex] = useState(0);
            const [isPlaying, setIsPlaying] = useState(false);

            useEffect(() => {
                if (!isPlaying) return;
                if (stepIndex === STATES.length - 1) {
                    setIsPlaying(false);
                    return;
                }
                const timer = window.setTimeout(() => setStepIndex(index => index + 1), 1300);
                return () => window.clearTimeout(timer);
            }, [isPlaying, stepIndex, STATES.length]);

            // 从当前帧提取具体的环境状态变量
            const { phase, treeDepth, algoStage, activeRow } = STATES[stepIndex];
            const activeMaskNode = phase === 3 ? VALID_NODES[activeRow] : null;
            const activeMaskKeys = activeMaskNode ? TREE_MASK[activeRow]
                .map((value, index) => value === 1 ? VALID_NODES[index] : null)
                .filter(Boolean) : [];
            const activePrediction = activeMaskNode ? TARGET_PREDICTIONS.find(pred => pred.sourceId === activeMaskNode.id) : null;
            const activeMaskAccepted = activeMaskNode && ['n1', 'n4', 'n7'].includes(activeMaskNode.id);

            const batchCenterX = phase === 1 
                ? (treeDepth === 1 ? 260 : treeDepth === 2 ? 430 : 640)
                : 400;

            // 纯手动步进控制函数
            const nextStep = () => {
                if (stepIndex < STATES.length - 1) setStepIndex(stepIndex + 1);
            };

            const prevStep = () => {
                if (stepIndex > 0) setStepIndex(stepIndex - 1);
            };

            const resetStep = () => {
                setIsPlaying(false);
                setStepIndex(0);
            };

            const getActiveParents = () => {
                if (phase !== 1) return [];
                if (treeDepth === 1) return [ROOT_NODE];
                if (treeDepth === 2) return ALL_DRAFT_NODES.filter(n => ['n1', 'n2', 'n3'].includes(n.id));
                if (treeDepth === 3) return ALL_DRAFT_NODES.filter(n => ['n4', 'n5', 'n6'].includes(n.id));
                return [];
            };

            const isParentOfCurrentDepth = (nodeId) => {
                if (treeDepth === 1 && nodeId === 'root') return true;
                if (treeDepth === 2 && ['n1', 'n2', 'n3'].includes(nodeId)) return true; 
                if (treeDepth === 3 && ['n4', 'n5', 'n6'].includes(nodeId)) return true; 
                return false;
            };

            const getAlgoDetailText = () => {
                if (phase !== 1) return "";
                switch (algoStage) {
                    case 0: return `【0. 提取挂载】锁定当前 Depth ${treeDepth} 的活跃分支端点，准备转化为 Tensor。`;
                    case 1: return `【1. 节点对齐】从显存拓扑树提取当前深度的活跃节点，并平铺整合成一维紧凑的 Tensor Batch 结构。`;
                    case 2: return `【2. 特征映射】批量 Tensor 挂载至 Draft Head 神经网络，通过快速的 MLP 变换映射出隐藏状态 h(x)。`;
                    case 3: return `【3. 并行映射】隐藏状态与 LM Head 词表矩阵并发相乘，直接向高维词汇表空间完成并行投影投射。`;
                    case 4: return `【4. 批量采样】翻牌显示 9 个候选词及其预测概率，并准备提取映射回拓扑树。`;
                    case 5: return `【5. 全局剪枝】裁决启动！对比全局剪枝阈值 τ=0.05。概率极低的不合格伪分支节点 (DROP) 直接做爆破废弃处理。`;
                    case 6: return `【6. 更新缓存】筛选保留的高质量节点 (KEEP)，计算对应的 KV-Cache 并正式挂载到树上，准备下一层迭代。`;
                    default: return "";
                }
            };

            const renderTreeEdges = () => {
                return ALL_DRAFT_NODES.map((node) => {
                    if (phase === 1) {
                        if (node.depth > treeDepth) return null;
                        if (node.depth === treeDepth && algoStage < 4) return null; 
                    }
                    const isRootParent = node.parent === 'root';
                    const parentNode = isRootParent ? ROOT_NODE : ALL_DRAFT_NODES.find(n => n.id === node.parent);
                    if (!parentNode) return null;

                    const isRejected = phase === 5 && !['n1', 'n4', 'n7'].includes(node.id);
                    const isAccepted = phase === 5 && !isRejected;
                    let strokeColor = '#475569';
                    let strokeDash = 'none';
                    let lineClasses = "transition-all duration-1000";

                    if (phase === 1) {
                        if (node.depth < treeDepth && node.isDummy) {
                            strokeColor = 'rgba(239, 68, 68, 0.3)'; strokeDash = '4,4';
                        } else if (node.depth === treeDepth) {
                            if (algoStage === 4) { strokeDash = '5,5'; strokeColor = '#fbbf24'; }
                            if (algoStage === 5 && node.isDummy) { strokeColor = '#ef4444'; strokeDash = '4,4'; }
                            if (algoStage === 6) {
                                if (node.isDummy) { strokeColor = 'rgba(239, 68, 68, 0.3)'; strokeDash = '4,4'; }
                                else { strokeColor = '#10b981'; }
                            }
                        }
                    } else {
                        if (node.isDummy) {
                            strokeColor = 'rgba(239, 68, 68, 0.2)'; strokeDash = '4,4';
                        } else {
                            if (isAccepted) strokeColor = '#10b981';
                            if (isRejected && phase === 5) { strokeColor = '#ef4444'; strokeDash = '5,5'; lineClasses += ' animate-[fadeOut_2s_forwards]'; }
                        }
                    }
                    
                    const startX = isRootParent ? parentNode.x + 60 : parentNode.x + 65; 
                    const endX = node.x - 65; 
                    const strokeWidthValue = (isAccepted || (phase === 1 && algoStage === 6 && node.depth === treeDepth && !node.isDummy)) ? 4 : 2; 

                    return (
                        <path key={`edge-${node.id}`} d={`M ${startX} ${parentNode.y} C ${startX + 50} ${parentNode.y}, ${endX - 50} ${node.y}, ${endX} ${node.y}`} fill="none" stroke={strokeColor} strokeWidth={strokeWidthValue} strokeDasharray={strokeDash} className={lineClasses} />
                    );
                });
            };

            const renderMicroActionPipeline = () => {
                if (phase !== 1) return null;
                const activeNodes = getActiveParents();
                if (activeNodes.length === 0) return null;

                const tensorBoxY = 45;
                const mlpBoxY = 125;
                const projectBoxY = 255; 

                return (
                    <div className="absolute inset-0 z-40 pointer-events-none transition-all duration-700">
                        <div className={`transition-opacity duration-500 ${algoStage >= 1 && algoStage <= 3 ? 'opacity-100' : 'opacity-0'}`}>
                            <div className={`absolute -translate-x-1/2 -translate-y-1/2 w-[420px] h-[50px] border-2 border-dashed rounded-xl transition-all duration-700 flex flex-col items-center justify-start pt-1 bg-cyan-950/20 ${algoStage === 1 ? 'border-cyan-400 shadow-[0_0_20px_rgba(34,211,238,0.2)]' : 'border-slate-800'}`} style={{left: batchCenterX, top: tensorBoxY}}>
                                <span className={`text-[12px] font-mono tracking-wider transition-colors ${algoStage === 1 ? 'text-cyan-300' : 'text-slate-600'}`}>1. Node Tensor Batch</span>
                            </div>
                            
                            <div className="absolute w-[2px] h-[20px] bg-slate-800 -translate-x-1/2 transition-all duration-700" style={{left: batchCenterX, top: tensorBoxY + 25}}>
                                {algoStage === 2 && <div className="w-full bg-indigo-400 animate-[lineDrop_1s_ease-out]" />}
                            </div>

                            <div className={`absolute -translate-x-1/2 -translate-y-1/2 w-[400px] h-[55px] border-2 rounded-lg transition-all duration-700 flex flex-col items-center justify-start pt-1 bg-indigo-950/30 ${algoStage === 2 ? 'border-indigo-400 shadow-[0_0_25px_rgba(99,102,241,0.3)]' : 'border-slate-800'}`} style={{left: batchCenterX, top: mlpBoxY}}>
                                <span className={`text-[12px] font-mono tracking-wider transition-colors ${algoStage === 2 ? 'text-indigo-300' : 'text-slate-600'}`}>2. Draft Head (MLP)</span>
                            </div>

                            <div className="absolute w-[2px] h-[40px] bg-slate-800 -translate-x-1/2 transition-all duration-700" style={{left: batchCenterX, top: mlpBoxY + 28}}>
                                {algoStage === 3 && <div className="w-full bg-purple-400 animate-[lineDrop_1s_ease-out]" />}
                            </div>

                            <div className={`absolute -translate-x-1/2 -translate-y-1/2 w-[480px] h-[160px] border-2 border-dashed rounded-xl transition-all duration-700 flex flex-col items-center justify-start pt-1 bg-purple-950/20 ${algoStage === 3 ? 'border-purple-400 shadow-[0_0_30px_rgba(168,85,247,0.3)]' : 'border-slate-800'}`} style={{left: batchCenterX, top: projectBoxY}}>
                                <span className={`text-[12px] font-mono tracking-wider transition-colors ${algoStage === 3 ? 'text-purple-300' : 'text-slate-600'}`}>3. Parallel Mapping (LM Head)</span>
                                
                                {algoStage === 3 && (
                                    <div className="absolute bottom-2 w-[94%] h-[26px] border border-purple-500/30 bg-purple-900/30 rounded flex items-center justify-center overflow-hidden">
                                        <div className="w-full h-full bg-[linear-gradient(90deg,transparent_2px,#a855f733_2px)] bg-[length:10px_10px] animate-[slideInRight_2s_linear_infinite]"></div>
                                        <span className="absolute text-purple-300/70 text-[12px] font-mono font-bold tracking-widest">W_vocab × f</span>
                                    </div>
                                )}
                            </div>
                        </div>

                        {activeNodes.map((node, index) => {
                            const spacing = 145; 
                            const startX = batchCenterX - ((activeNodes.length - 1) * spacing) / 2;
                            const alignedX = startX + index * spacing;
                            const candidates = getCandidatesData(node.id);

                            let tokenX = node.x;
                            let tokenY = node.y;
                            let content = `v(${node.id})`;
                            let shapeClass = "w-[64px] h-[28px] rounded flex items-center justify-center font-mono text-sm font-bold transition-all duration-700 shadow-lg";
                            
                            if (algoStage === 0) {
                                shapeClass += " opacity-0 bg-cyan-600 scale-50"; 
                            } else if (algoStage === 1) {
                                tokenX = alignedX; tokenY = tensorBoxY + 8;
                                shapeClass += " opacity-100 bg-cyan-900 border border-cyan-400 text-cyan-200 scale-100";
                            } else if (algoStage === 2) {
                                tokenX = alignedX; tokenY = mlpBoxY + 8; content = `h(${node.id})`;
                                shapeClass += " opacity-100 bg-indigo-900 border border-indigo-400 text-indigo-200 scale-105 !rounded-full";
                            } else if (algoStage >= 3 && algoStage <= 5) {
                                tokenX = alignedX; tokenY = projectBoxY - 35; content = `[ f${index+1} ]`;
